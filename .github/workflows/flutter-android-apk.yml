name: Release APK on version change

# Builds and publishes a GitHub Release with the APK ONLY when the version in
# pubspec.yaml changes (i.e. when a tag v<version> does not yet exist).
# Bump `version:` in pubspec.yaml, commit, push to main -> a release appears.

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual run (still skips if the version already released)

permissions:
  contents: write      # required to create the release / tag

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version & check if it was already released
        id: check
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1 | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read 'version:' from pubspec.yaml"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "Release v$VERSION already exists - nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$VERSION - a release will be created."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests (if any)
        if: ${{ hashFiles('test/**') != '' }}
        run: flutter test

      # Release build is signed with the debug key in this project,
      # so the APK is installable on any device (no secrets required).
      - name: Build release APK
        run: flutter build apk --release

      - name: Stage APK with a versioned name
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/IosMobileApp-v${{ needs.check.outputs.version }}.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-mobile-app-apk
          path: dist/*.apk

      - name: Create GitHub Release and attach APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ needs.check.outputs.version }}" dist/*.apk \
            --title "v${{ needs.check.outputs.version }}" \
            --notes "Automated release for version ${{ needs.check.outputs.version }}." \
            --target "${{ github.sha }}"
